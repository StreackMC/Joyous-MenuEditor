<!DOCTYPE HTML>
<html lang="zh_cn">

<head>
  <link rel="stylesheet" href="./css/sober-theme.css" />
  <link rel="stylesheet" href="./css/predef.css" />
  <style>
    html,
    body {
      background: transparent;
      margin: 0;
    }

    body,
    s-page {
      width: 100vw;
      height: 100vh;
    }

    s-card {
      width: 80vw;
      height: 80vh;
      padding: 0;
      margin: 10vh 10vw 10vh 10vw;
      max-width: none;
      display: flex;
      flex-direction: column;
    }

    * {
      user-select: none;
      -moz-user-select: none;
      transition: all .5s ease-out;
    }

    span[title] {
      text-decoration: underline dotted;
      color: #1eb882;
    }

    div#text {
      height: max-content;
      overflow: auto;
      flex: 1;
    }
  </style>
  <script src="./javascript/library/sober@1.1.8.min.js"></script>
  <link rel="preload" href="./assets/i18n/zh_cn.json" as="fetch" />
</head>

<body>
  <s-page>
    <s-card clickable="false">
      <div slot="headline" id="title"></div>
      <div slot="text" id="text"></div>
      <s-button slot="action" id="confirmBtn" data-error="" disabled="true"></s-button>
    </s-card>
  </s-page>
  <script type="module" src="./javascript/editor/browser/in-iframe.js"></script>
  <script>
    window.joyous = {
      subpage: "editor.browser.warnpage",
    };
    function putErrorStatusOnLoading() {
    }
  </script>
</body>

</html>
